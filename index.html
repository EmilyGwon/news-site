<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>콘텐츠 재구성 놀이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#f5f8fa; --panel:#ffffff; --panel2:#f5f8fa; --line:#dfe3eb; --text:#33475b; --dim:#516f90; --accent:#ff7a59; --green:#00bda5; --red:#e5484d; --redbg:#fdecec; --copied:#e0a800; }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; font-family:'Lexend Deca','Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  header { padding:12px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; background:var(--panel); box-shadow:0 1px 2px rgba(45,62,80,.04); }
  header h1 { font-size:16px; margin:0; color:var(--text); }
  header .sub { color:var(--dim); font-size:12px; }
  header .spacer { flex:1; }
  header .who { color:var(--dim); font-size:12px; }
  header .logout { background:transparent; border:1px solid var(--line); color:var(--dim); border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; }
  .wrap { display:grid; grid-template-columns:186px 320px 1fr; height:calc(100vh - 49px); }
  aside, .list { border-right:1px solid var(--line); overflow-y:auto; }
  aside { padding:10px 8px; background:var(--panel); }
  aside .date { color:var(--dim); font-size:11px; margin:10px 6px 4px; letter-spacing:.03em; }
  .slot { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-radius:8px; cursor:pointer; font-size:13px; }
  .slot:hover { background:var(--panel2); }
  .slot.active { background:var(--accent); color:#fff; }
  .slot .cnt { font-size:11px; color:var(--dim); }
  .slot.active .cnt { color:#dbe7ff; }
  .list { background:var(--panel); }
  .list .lh { padding:11px 14px; font-size:12px; color:var(--dim); border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--panel); }
  .row { display:flex; gap:9px; align-items:flex-start; padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; }
  .row:hover { background:var(--panel2); }
  .row.active { background:#eaf0f6; box-shadow:inset 3px 0 0 var(--accent); }
  .row.copied { opacity:.5; }
  .row .rk { background:var(--panel2); color:var(--dim); font-weight:700; border-radius:6px; min-width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12px; flex:none; }
  .row.active .rk { background:var(--accent); color:#fff; }
  .row .rt { font-size:13.5px; line-height:1.45; }
  .row .taken { display:inline-block; font-size:10.5px; font-weight:700; color:#0f1115; background:var(--copied); border-radius:5px; padding:0 6px; margin-left:4px; white-space:nowrap; vertical-align:1px; }
  .row .dot { width:7px; height:7px; border-radius:50%; margin-top:8px; flex:none; }
  .dot.g { background:var(--green); } .dot.w { background:#cbd6e2; }
  main { overflow-y:auto; padding:0; }
  .detail-empty { color:var(--dim); padding:60px; text-align:center; line-height:1.7; }
  .dhead { display:flex; align-items:center; gap:10px; padding:14px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:2; }
  .dhead .rk { background:var(--accent); color:#fff; font-weight:700; border-radius:8px; min-width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .dhead .dt { font-weight:700; font-size:15px; flex:1; line-height:1.4; }
  .takenbadge { font-size:12px; font-weight:700; color:#0f1115; background:var(--copied); border-radius:6px; padding:4px 10px; white-space:nowrap; }
  .btn { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; box-shadow:0 1px 2px rgba(255,122,89,.35); }
  .btn:hover { background:#ff8f73; }
  .btn:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
  .linkbtn { background:transparent; border:1px solid var(--line); color:var(--dim); border-radius:6px; padding:7px 10px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .cols { display:grid; grid-template-columns:1fr 1fr; }
  .col { padding:16px 20px; }
  .col.before { border-right:1px solid var(--line); background:#f9fafc; }
  .col h4 { margin:0 0 12px; font-size:12px; letter-spacing:.03em; }
  .col.before h4 { color:#cc4a4a; } .col.after h4 { color:#00a38f; }
  .art-title { font-weight:700; font-size:16px; margin:0 0 6px; line-height:1.5; }
  .alt { font-size:12px; color:var(--dim); margin:0 0 12px; }
  p.par { margin:0 0 11px; line-height:1.8; font-size:14.5px; }
  .imgblk { margin:0 0 12px; }
  .imgblk img { max-width:100%; border-radius:8px; display:block; }
  .cap { font-size:12px; color:var(--dim); margin-top:5px; }
  .cred { color:#00a4bd; }
  p.added { background:var(--redbg); border-left:3px solid var(--red); padding:9px 12px; border-radius:0 8px 8px 0; margin:0 0 11px; line-height:1.8; font-size:14.5px; }
  .addtag { display:inline-block; font-size:11px; font-weight:700; color:#fff; background:var(--red); border-radius:5px; padding:1px 7px; margin-right:6px; vertical-align:1px; }
  .waiting { color:var(--dim); font-size:13.5px; }
  /* 로그인 화면 */
  #login { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:50; }
  #login .card { width:360px; max-width:90vw; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:32px 28px; box-shadow:0 8px 24px rgba(45,62,80,.12); }
  #login h2 { margin:0 0 4px; font-size:19px; }
  #login .desc { color:var(--dim); font-size:13px; margin:0 0 20px; line-height:1.6; }
  #login label { display:block; font-size:12px; color:var(--dim); margin:14px 0 5px; }
  #login input { width:100%; padding:11px 12px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:14px; }
  #login input:focus { outline:none; border-color:var(--accent); }
  #login .loginbtn { width:100%; margin-top:20px; background:var(--accent); color:#fff; border:0; border-radius:6px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:0 1px 2px rgba(255,122,89,.35); }
  #login .loginbtn:hover { background:#ff8f73; }
  #login .loginbtn:disabled { opacity:.5; }
  #login .err { color:var(--red); font-size:13px; margin-top:12px; min-height:18px; }
  #login .foot { color:var(--dim); font-size:11px; margin-top:16px; line-height:1.6; }
  #app { display:none; }
  @media (max-width:900px){ .wrap{grid-template-columns:1fr; height:auto} aside,.list{max-height:none} .cols{grid-template-columns:1fr} .col.before{border-right:0;border-bottom:1px solid var(--line)} }
</style>
</head>
<body>

<!-- 로그인 화면 (승인된 계정만) -->
<div id="login" style="display:none">
  <div class="card">
    <h2>🎨 콘텐츠 재구성 놀이터</h2>
    <p class="desc">사내 전용 자료입니다. 승인된 계정으로 로그인하세요.</p>
    <form id="loginForm">
      <label>이메일</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@fastviewkorea.com" required />
      <label>비밀번호</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button class="loginbtn" type="submit" id="loginSubmit">로그인</button>
      <div class="err" id="loginErr"></div>
    </form>
    <div class="foot">계정이 필요하면 관리자에게 요청하세요. (공개 가입 불가)</div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <h1>🎨 콘텐츠 재구성 놀이터</h1>
    <span class="sub" id="genAt"></span>
    <span class="spacer"></span>
    <span class="who" id="who"></span>
    <button class="logout" id="logoutBtn" style="display:none">로그아웃</button>
  </header>
  <div class="wrap">
    <aside id="nav"></aside>
    <section class="list" id="list"></section>
    <main id="detail"><div class="detail-empty">왼쪽에서 시간대를 고르고, 기사 제목을 클릭하세요.</div></main>
  </div>
</div>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const A = window.ARCHIVE || { batches: [] };
let curBatch = A.batches[0] ? A.batches[0].id : null;
let curRank = null;
let supa = null, user = null;

// ---------- 복사 상태(팀 공유 / 로컬 폴백) ----------
const Copied = {
  map: {},
  key: (bid, rank) => bid + "#" + rank,
  async load() {
    if (supa) {
      const { data } = await supa.from("copied").select("*");
      this.map = {};
      for (const r of data || []) this.map[this.key(r.batch_id, r.rank)] = { by: r.copied_by, at: r.copied_at };
    } else {
      try { this.map = JSON.parse(localStorage.getItem("tvr_copied") || "{}"); } catch { this.map = {}; }
    }
  },
  is(bid, rank) { return !!this.map[this.key(bid, rank)]; },
  info(bid, rank) { return this.map[this.key(bid, rank)]; },
  async mark(bid, rank) {
    const rec = { by: user ? user.email : "me", at: new Date().toISOString() };
    this.map[this.key(bid, rank)] = rec;
    if (supa) { await supa.from("copied").upsert({ batch_id: bid, rank, copied_by: rec.by, copied_at: rec.at }); }
    else { this._save(); }
  },
  async clear(bid, rank) {
    delete this.map[this.key(bid, rank)];
    if (supa) { await supa.from("copied").delete().eq("batch_id", bid).eq("rank", rank); }
    else { this._save(); }
  },
  time(bid, rank) { const c = this.info(bid, rank); if (!c) return ""; const d = new Date(c.at); return ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2); },
  byShort(bid, rank) { const c = this.info(bid, rank); if (!c || !c.by) return ""; return c.by.split("@")[0]; },
  _save() { try { localStorage.setItem("tvr_copied", JSON.stringify(this.map)); } catch {} },
};

function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmtCredit(cap){
  const p = (cap||'').split(/\s*\/\s*(?=사진\s*[=:｜|]|출처\s*[:=]|사진제공)/);
  if(p.length>1) return esc(p[0])+' <span class="cred">/ '+esc(p.slice(1).join(' / '))+'</span>';
  return esc(cap);
}
function blocksHTML(blocks){
  return (blocks||[]).map(b=>{
    if(b.type==='image') return '<div class="imgblk"><img loading="lazy" src="'+esc(b.src)+'">'+(b.caption?'<div class="cap">'+fmtCredit(b.caption)+'</div>':'')+'</div>';
    if(b.added) return '<p class="added"><span class="addtag">🔴 확인 필요</span>'+esc(b.text)+'</p>';
    return '<p class="par">'+esc(b.text)+'</p>';
  }).join('');
}
function articleHTML(a){
  return '<h3 class="art-title">'+esc(a.title)+'</h3>'
    + ((a.titleAlt&&a.titleAlt.length)?'<div class="alt">제목 대안: '+a.titleAlt.map(esc).join(' · ')+'</div>':'')
    + blocksHTML(a.blocks);
}
function buildCopyHTML(a){
  let h = '<p><b>'+esc(a.title)+'</b></p>';
  for(const b of a.blocks){
    if(b.type==='image'){ h += '<p><img src="'+esc(b.src)+'" style="max-width:100%"></p>'; if(b.caption) h += '<p style="color:#666;font-size:13px">'+esc(b.caption)+'</p>'; }
    else if(b.added){ h += '<p>〔확인필요〕 '+esc(b.text)+'</p>'; }
    else { h += '<p>'+esc(b.text)+'</p>'; }
  }
  return h;
}
function copyText(a){
  let out = a.title + '\n\n';
  for(const b of a.blocks){
    if(b.type==='image') out += (b.caption?('[사진] '+b.caption):'[사진]')+'\n\n';
    else if(b.added) out += '〔확인필요〕 '+b.text+'\n\n';
    else out += b.text+'\n\n';
  }
  return out.trim();
}
async function doCopy(article){
  const html = buildCopyHTML(article), plain = copyText(article);
  if(navigator.clipboard && window.ClipboardItem && window.isSecureContext){
    try{ await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]); return true; }catch(e){}
  }
  try{
    const holder=document.createElement('div'); holder.setAttribute('contenteditable','true');
    holder.style.cssText='position:fixed;left:-99999px;top:0;'; holder.innerHTML=html; document.body.appendChild(holder);
    const r=document.createRange(); r.selectNodeContents(holder);
    const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
    const ok=document.execCommand('copy'); s.removeAllRanges(); holder.remove(); return ok;
  }catch(e){ return false; }
}

function renderNav(){
  const byDate={};
  for(const b of A.batches){ (byDate[b.date]=byDate[b.date]||[]).push(b); }
  let h='';
  for(const date of Object.keys(byDate)){
    h+='<div class="date">📅 '+date+'</div>';
    for(const b of byDate[date])
      h+='<div class="slot '+(b.id===curBatch?'active':'')+'" data-id="'+b.id+'"><span>🕘 '+b.time+'</span><span class="cnt">'+b.doneCount+'/'+b.count+'</span></div>';
  }
  const nav=document.getElementById('nav'); nav.innerHTML=h||'<div class="detail-empty">배치 없음</div>';
  nav.querySelectorAll('.slot').forEach(el=>el.onclick=()=>{ curBatch=el.dataset.id; curRank=null; renderNav(); renderList(); renderDetail(); });
}
function renderList(){
  const b=A.batches.find(x=>x.id===curBatch); const list=document.getElementById('list');
  if(!b){ list.innerHTML=''; return; }
  const takenCnt=b.items.filter(it=>Copied.is(b.id,it.rank)).length;
  let h='<div class="lh">📄 '+b.date+' '+b.time+' · 기사 '+b.count+'건 · 리라이트 '+b.doneCount+' · <span style="color:var(--copied)">복사됨 '+takenCnt+'</span></div>';
  for(const it of b.items){
    const done=!!it.rewritten, taken=Copied.is(b.id,it.rank);
    const who=taken?Copied.byShort(b.id,it.rank):'';
    h+='<div class="row '+(it.rank===curRank?'active':'')+(taken?' copied':'')+'" data-rank="'+it.rank+'">'
      +'<div class="rk">'+it.rank+'</div>'
      +'<div class="rt">'+esc((it.rewritten||it.original).title)+(taken?' <span class="taken">✔ '+(who?esc(who)+' 복사':'복사됨')+'</span>':'')+'</div>'
      +'<div class="dot '+(done?'g':'w')+'"></div></div>';
  }
  list.innerHTML=h;
  list.querySelectorAll('.row').forEach(el=>el.onclick=()=>{ curRank=parseInt(el.dataset.rank,10); renderList(); renderDetail(); });
}
function renderDetail(){
  const b=A.batches.find(x=>x.id===curBatch); const d=document.getElementById('detail');
  if(!b||curRank==null){ d.innerHTML='<div class="detail-empty">기사 제목을 클릭하면 여기에 <b>원문(전)</b>과 <b>리라이트(후)</b>가 좌우로 표시됩니다.</div>'; return; }
  const it=b.items.find(x=>x.rank===curRank); const done=!!it.rewritten, taken=Copied.is(b.id,it.rank);
  const who=taken?Copied.byShort(b.id,it.rank):'';
  let ctrl = taken
    ? '<span class="takenbadge">✔ '+(who?esc(who)+' · ':'')+Copied.time(b.id,it.rank)+' 복사</span><button class="linkbtn" id="undoBtn">복사 취소</button>'
    : '<button class="btn" id="copyBtn" '+(done?'':'disabled')+'>📋 리라이트 복사</button>';
  let h='<div class="dhead"><div class="rk">'+it.rank+'</div><div class="dt">'+esc((it.rewritten||it.original).title)+'</div>'+ctrl+'</div>';
  h+='<div class="cols"><div class="col before"><h4>◀ 전 · 원문 (네이버 수집)</h4>'+articleHTML(it.original)+'</div>'
    +'<div class="col after"><h4>후 · 리라이트 ▶</h4>'+(done?articleHTML(it.rewritten):'<p class="waiting">아직 리라이트되지 않았습니다. (원문만 수집)</p>')+'</div></div>';
  d.innerHTML=h;
  const cb=document.getElementById('copyBtn');
  if(cb) cb.onclick=async()=>{ await doCopy(it.rewritten); await Copied.mark(b.id,it.rank); renderList(); renderDetail(); };
  const ub=document.getElementById('undoBtn');
  if(ub) ub.onclick=async()=>{ await Copied.clear(b.id,it.rank); renderList(); renderDetail(); };
}

function renderAll(){ renderNav(); renderList(); renderDetail(); }

async function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('genAt').textContent = A.generatedAt ? '업데이트 '+A.generatedAt : '';
  if(user){
    document.getElementById('who').textContent = user.email;
    const lo=document.getElementById('logoutBtn'); lo.style.display='inline-block';
    lo.onclick=async()=>{ await supa.auth.signOut(); location.reload(); };
  }
  await Copied.load();
  renderAll();
  if(supa){
    supa.channel('copied-rt').on('postgres_changes',{event:'*',schema:'public',table:'copied'}, async()=>{ await Copied.load(); renderList(); renderDetail(); }).subscribe();
  }
}

function showLogin(){
  document.getElementById('app').style.display='none';
  const lg=document.getElementById('login'); lg.style.display='flex';
  const form=document.getElementById('loginForm'), err=document.getElementById('loginErr'), btn=document.getElementById('loginSubmit');
  form.onsubmit=async(e)=>{
    e.preventDefault(); err.textContent=''; btn.disabled=true; btn.textContent='로그인 중...';
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    btn.disabled=false; btn.textContent='로그인';
    if(error){ err.textContent = '로그인 실패: 이메일/비밀번호를 확인하세요.'; return; }
    user = data.user; startApp();
  };
}

(async function init(){
  const cfg = window.SUPA || {};
  if(cfg.url && cfg.anonKey && window.supabase){
    supa = window.supabase.createClient(cfg.url, cfg.anonKey);
    const { data } = await supa.auth.getSession();
    user = data.session ? data.session.user : null;
    if(user) startApp(); else showLogin();
  } else {
    // 로컬 모드: Supabase 미설정 → 로그인 없이 동작(개발/미리보기용)
    startApp();
  }
})();
</script>
</body>
</html>
